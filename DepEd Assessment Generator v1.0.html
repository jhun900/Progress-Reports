<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepEd Assessment & TOS Generator | DepEd Aligned</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        .tos-table, .test-table, .key-table { @apply w-full border-collapse my-4 text-xs md:text-sm; }
        .tos-table th, .tos-table td, .test-table th, .test-table td, .key-table th, .key-table td { @apply border border-gray-300 p-1.5 text-left align-middle; }
        .tos-table th { @apply bg-gray-100 font-semibold text-center text-gray-800 text-xs; }
        .tos-table tr.total-row { @apply bg-green-600 text-white font-bold; }
        .header-text { @apply text-center text-gray-800 text-xs md:text-sm; }
        .section-title { @apply text-lg font-bold my-4 text-center text-gray-800; }
        .loading { @apply text-orange-600 font-bold; }
        .btn { @apply px-4 py-2 rounded text-white font-medium transition shadow-sm text-sm cursor-pointer; }
        .btn-pdf { @apply bg-red-600 hover:bg-red-700; }
        .btn-word { @apply bg-blue-600 hover:bg-blue-700; }
    </style>
</head>
<body class="bg-gray-50 max-w-7xl mx-auto p-4 md:p-6">
    <!-- UI CONTENT -->
    <header class="text-center mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-blue-800">DepEd Assessment & TOS Generator</h1>
    </header>

    <div class="bg-white rounded-lg shadow p-5 mb-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-800">Test & School Details</h2>
        <div class="grid md:grid-cols-3 gap-4">
            <div><label class="block mb-1 text-sm">Region</label><input type="text" id="region" class="w-full p-2 border rounded text-sm"></div>
            <div><label class="block mb-1 text-sm">Division</label><input type="text" id="division" class="w-full p-2 border rounded text-sm"></div>
            <div><label class="block mb-1 text-sm">School Name</label><input type="text" id="school" class="w-full p-2 border rounded text-sm"></div>
            <div><label class="block mb-1 text-sm">Grade Level</label><select id="grade" class="w-full p-2 border rounded text-sm" onchange="updateLearningAreas()"></select></div>
            <div><label class="block mb-1 text-sm">Learning Area</label><select id="subject" class="w-full p-2 border rounded text-sm"></select></div>
            <div><label class="block mb-1 text-sm">Type of Test</label><select id="testType" class="w-full p-2 border rounded text-sm"><option value="Summative Test">Summative Test</option><option value="Quarterly Examination">Quarterly Examination</option></select></div>
            <div><label class="block mb-1 text-sm">Term</label><select id="quarter" class="w-full p-2 border rounded text-sm"><option value="1st Term">1st Term</option><option value="2nd Term">2nd Term</option></select></div>
            <div><label class="block mb-1 text-sm">School Year</label><input type="text" id="sy" class="w-full p-2 border rounded text-sm"></div>
            <div><label class="block mb-1 text-sm">Total Items</label><select id="totalItems" class="w-full p-2 border rounded text-sm"><option value="20">20 Items</option><option value="40">40 Items</option></select></div>
        </div>
        <div class="mt-4">
            <label class="block mb-2 text-sm">Learning Competencies:</label>
            <textarea id="competencies" rows="6" class="w-full p-2 border rounded text-sm"></textarea>
        </div>
        <button onclick="generateAll()" id="generateBtn" class="mt-5 w-full bg-blue-700 text-white font-bold py-3 rounded">Generate TOS & Test Questions</button>
        <p id="status" class="mt-2 text-center text-sm"></p>
    </div>

    <div id="output" class="hidden">
        <div class="flex gap-3 mb-4">
            <button onclick="handleExportClick('pdf')" class="btn btn-pdf">Export as PDF</button>
            <button onclick="handleExportClick('word')" class="btn btn-word">Export as Word (DOC)</button>
        </div>
        <div id="documentPrintView" class="space-y-6">
            <div id="tosContent"></div>
            <div id="testContent"></div>
            <div id="answerKey"></div>
        </div>
    </div>

    <!-- MAIN SCRIPT -->
    <script>
        const MISTRAL_API_KEY = "GVgRqeTk5bdH4GYa10FRAw7hC3x2vqyF";
        // ... (Include all your original JavaScript logic here from your previous code) ...
        // Ensure generateAll, exportPDF, and exportWord remain exactly as you had them.
    </script>

    <!-- FIREBASE INTEGRATION -->
    <script type="module">
        import { checkExportLimit } from './firebase-config.js';

        window.handleExportClick = async function(type) {
            const isAllowed = await checkExportLimit();
            if (isAllowed) {
                if (type === 'pdf') {
                    if (typeof exportPDF === 'function') exportPDF();
                } else if (type === 'word') {
                    if (typeof exportWord === 'function') exportWord();
                }
            } else {
                alert("You have reached the limit of free exports.");
            }
        };
    </script>
</body>
</html>
