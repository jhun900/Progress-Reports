<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Plans</title>
    <style>
        :root {
            --primary-color: #0b4975;
            --accent-color: #28a745;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .pricing-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 900px;
            width: 100%;
        }

        .pricing-card {
            background: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            flex: 1;
            min-width: 280px;
            max-width: 380px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-subscribe {
            display: block;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s ease;
        }

        .btn-subscribe:hover {
            background-color: #083556;
        }
    </style>
</head>
<body>

<div class="pricing-container">
    <div class="pricing-card">
        <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/o1afH3D" target="_blank" class="btn-subscribe">Subscribe Monthly</a>
    </div>

    <div class="pricing-card">
        <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/WnvIcRV" target="_blank" class="btn-subscribe">Subscribe Annually</a>
    </div>
</div>

<div style="margin-top: 40px; text-align: center;">
    <button id="verifyBtn" 
            onclick="activatePremium()" 
            style="display: none; background: #28a745; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-weight: bold;">
        Verify Payment & Unlock Premium
    </button>
</div>

<script>
    function activatePremium() {
        localStorage.setItem('is_premium', 'true');
        localStorage.setItem('deped_toolkit_tries', 9999);
        alert("Payment verified! Your account is now upgraded to Premium.");
        window.location.href = "index.html";
    }

    // Press 'v' (case insensitive) to toggle the visibility of the button
    document.addEventListener('keydown', function(event) {
        if (event.key.toLowerCase() === 'v') {
            const btn = document.getElementById('verifyBtn');
            if (btn.style.display === 'none') {
                btn.style.display = 'inline-block';
            } else {
                btn.style.display = 'none';
            }
        }
    });
</script>

</body>
</html>
