<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Plans</title>
    <style>
        :root {
            --primary-color: #0b4975;
            --accent-color: #28a745;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .pricing-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            width: 100%;
        }

        .pricing-card {
            background: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            width: 300px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Click-Proof Button Styling */
        .btn-subscribe {
            display: inline-block;
            background-color: var(--primary-color);
            color: #ffffff !important;
            text-decoration: none !important;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            position: relative;
            z-index: 100; /* Ensures button stays on top */
            transition: background 0.2s;
        }

        .btn-subscribe:hover {
            background-color: #083556;
        }
    </style>
</head>
<body>

<div class="pricing-container">
    <div class="pricing-card">
        <h3>Monthly Plan</h3>
        <p>₱149 / month</p>
        <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/o1afH3D" target="_blank" class="btn-subscribe">Subscribe Monthly</a>
    </div>

    <div class="pricing-card">
        <h3>Annual Plan</h3>
        <p>₱999 / year</p>
        <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/WnvIcRV" target="_blank" class="btn-subscribe">Subscribe Annually</a>
    </div>
</div>

<button id="verifyBtn" 
        onclick="activatePremium()" 
        style="display: none; margin-top: 40px; background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold;">
    Verify Payment & Unlock Premium
</button>

<script>
    function activatePremium() {
        localStorage.setItem('is_premium', 'true');
        localStorage.setItem('deped_toolkit_tries', 9999);
        alert("Payment verified! Access unlocked.");
        window.location.href = "index.html";
    }

    // Toggle verify button with 'v'
    document.addEventListener('keydown', function(event) {
        if (event.key.toLowerCase() === 'v') {
            const btn = document.getElementById('verifyBtn');
            btn.style.display = (btn.style.display === 'none') ? 'block' : 'none';
        }
    });
</script>

</body>
</html>
