<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Plans</title>
    <style>
        :root {
            --primary-color: #0b4975; /* Matches your dashboard header */
            --accent-color: #28a745;  /* Matches your "System Online" badge */
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .pricing-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            max-width: 900px;
            width: 100%;
        }

        .pricing-card {
            background: #ffffff;
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            padding: 32px 24px;
            text-align: center;
            flex: 1;
            min-width: 280px;
            max-width: 380px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            position: relative;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .pricing-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        /* Highlight the Annual Plan */
        .pricing-card.featured {
            border: 2px solid var(--primary-color);
        }

        .badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent-color);
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .plan-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 0 0 12px 0;
        }

        .plan-price {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .plan-price span {
            font-size: 1rem;
            font-weight: 400;
            color: #666;
        }

        .plan-savings {
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 24px;
            min-height: 20px; /* Prevents card layout shifting */
        }

        .plan-features {
            list-style: none;
            padding: 0;
            margin: 0 0 32px 0;
            text-align: left;
            flex-grow: 1;
        }

        .plan-features li {
            padding: 10px 0;
            border-bottom: 1px solid #f0f2f5;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }

        .plan-features li::before {
            content: "✓";
            color: var(--accent-color);
            font-weight: bold;
            margin-right: 10px;
        }

        .btn-subscribe {
            display: block;
            background-color: var(--primary-color);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s ease;
        }

        .btn-subscribe:hover {
            background-color: #083556;
        }

        .featured .btn-subscribe {
            background-color: var(--accent-color);
        }

        .featured .btn-subscribe:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="pricing-container">
    
    <div class="pricing-card">
        <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/o1afH3D" target="_blank" class="btn-subscribe">Subscribe Monthly</a>
    </div>

    <div class="pricing-card featured">
        <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/WnvIcRV" target="_blank" class="btn-subscribe">Subscribe Annually</a>
    </div>
</div>

<div style="margin-top: 40px; text-align: center;">
    <button id="verifyBtn" 
            onclick="activatePremium()" 
            style="background: #ccc; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;" 
            class="hidden">
        Verify Payment & Unlock Premium
    </button>
</div>

<script>
    function activatePremium() {
        localStorage.setItem('is_premium', 'true');
        localStorage.setItem('deped_toolkit_tries', 9999);
        alert("Payment verified! Your account is now upgraded to Premium.");
        window.location.href = "index.html";
    }

    // Optional: Add a keyboard shortcut to show the button (e.g., Press 'V')
    // This allows you to verify a user secretly without cluttering the page.
    document.addEventListener('keydown', function(event) {
        if (event.key === 'v') {
            document.getElementById('verifyBtn').classList.remove('hidden');
        }
    });
</script>

</body>
</html>
