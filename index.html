<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepEd Portal Toolkit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { depedBlue: '#004B87', depedDark: '#00335C', paymongoGreen: '#28a745' } } }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <header class="bg-white shadow-sm border-b-4 border-depedBlue sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 max-w-6xl flex justify-between items-center">
            <h1 class="text-xl font-bold text-depedDark">DepEd Educator's Toolkit Portal</h1>
            <span id="trialBadge" class="text-xs font-semibold bg-blue-50 text-depedBlue px-3 py-1 rounded-full border border-blue-200">
                <i class="fa fa-bolt mr-1"></i> Free Tries Left: <span id="triesCounter">3</span>/3
            </span>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="bg-white border-2 border-indigo-500 rounded-xl shadow-sm p-5 flex flex-col">
                <h3 class="font-bold text-gray-900 mb-1">Reading Resources Generator</h3>
                <p class="text-xs text-gray-600 mb-4">Generate DepEd-aligned reading materials.</p>
                <a href="reading-resources.html" onclick="return handleToolAccess(event, this.href)" class="text-xs font-bold text-indigo-600 hover:underline">Open Tool →</a>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
                <h3 class="font-bold text-gray-900 mb-1">ILAW Lesson Plan Generator</h3>
                <p class="text-xs text-gray-600 mb-4">Official ILAW Matrix layout generator.</p>
                <a href="Official DepEd ILAW Lesson Plan Generator.html" onclick="return handleToolAccess(event, this.href)" class="text-xs font-bold text-depedBlue hover:underline">Open Tool →</a>
            </div>
        </div>
    </main>

    <script>
        // Update Counter UI
        function updateUI() {
            let isPremium = localStorage.getItem('is_premium') === 'true';
            let freeTries = parseInt(localStorage.getItem('deped_toolkit_tries') || 3);
            const counterEl = document.getElementById('triesCounter');
            if (counterEl) {
                counterEl.innerText = isPremium ? "∞" : freeTries;
            }
        }

        // Handle Access
        function handleToolAccess(event, url) {
            let isPremium = localStorage.getItem('is_premium') === 'true';
            let freeTries = parseInt(localStorage.getItem('deped_toolkit_tries') || 3);

            if (isPremium || freeTries > 0) {
                return true; 
            } else {
                event.preventDefault();
                alert("Free tries exhausted. Please upgrade to continue.");
                return false;
            }
        }

        updateUI();
    </script>
</body>
</html>
