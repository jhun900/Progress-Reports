<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepEd Educator's Toolkit Portal</title>
    <style>
        :root {
            --primary: #5a32ea;
            --text-dark: #2d2d3a;
            --bg-body: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: radial-gradient(circle at top right, #e0d8ff, transparent),
                        radial-gradient(circle at bottom left, #d1d4ff, transparent);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav { width: 90%; max-width: 1000px; padding: 30px 0; display: flex; justify-content: space-between; align-items: center; }
        .hero-card { background: white; width: 90%; max-width: 1000px; padding: 60px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 40px; margin-bottom: 50px; }
        .hero-text h1 { font-size: 3rem; color: var(--text-dark); margin: 0; }
        .btn { background: var(--primary); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        
        #sub-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; max-width: 450px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 800; font-size: 1.2rem;">DEPD TOOLKIT</div>
        <div>Portal Access</div>
    </nav>

    <div class="hero-card">
        <div class="hero-text">
            <h1>Educator's<br>Toolkit Portal</h1>
            <p>Official ILAW lesson planning and assessment generation.</p>
            <button class="btn" onclick="handleToolClick('Official DepEd ILAW Lesson Plan Generator.html')">Start Generating</button>
        </div>
        <div style="background: #fdf5f5; border-radius: 20px; height: 300px; border: 2px dashed #eecaca; display: flex; align-items: center; justify-content: center; color: #d17a7a;">
            Dashboard Preview
        </div>
    </div>

    <div id="sub-modal">
        <div class="modal-content">
            <h2>Unlock Full Access</h2>
            <p>You've used all 3 free trials. Please upgrade to continue.</p>
            <div style="display:flex; gap:15px; margin-top:20px; flex-direction: column;">
                <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/o1afH3D" class="btn">Monthly Plan</a>
                <a href="https://pm.link/org-3uNpEp6juxNSZQt3KcdRoWSP/WnvIcRV" class="btn" style="background:#333;">Yearly Plan</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, checkExportLimit } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js";

        // Logic to handle navigation
        window.handleToolClick = async (url) => {
            const allowed = await checkExportLimit();
            if (allowed) {
                window.location.href = url;
            } else {
                document.getElementById('sub-modal').style.display = 'flex';
            }
        };

        // Close modal if user clicks outside
        window.onclick = (event) => {
            if (event.target == document.getElementById('sub-modal')) {
                document.getElementById('sub-modal').style.display = "none";
            }
        }
    </script>
</body>
</html>
