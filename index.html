<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepEd Portal Toolkit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { depedBlue: '#004B87', depedDark: '#00335C', depedLight: '#E6F0F8', paymongoGreen: '#28a745' } } }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <header class="bg-white shadow-sm border-b-4 border-depedBlue sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 max-w-6xl flex justify-between items-center">
            <h1 class="text-xl font-bold text-depedDark">DepEd Educator's Toolkit Portal</h1>
            <span id="trialBadge" class="text-xs font-semibold bg-blue-50 text-depedBlue px-3 py-1 rounded-full border border-blue-200">
                <i class="fa fa-bolt mr-1"></i> Free Tries Left: <span id="triesCounter">3</span>/3
            </span>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="bg-white border-2 border-indigo-500 rounded-xl shadow-sm hover:shadow-md transition-all flex flex-col group">
                <div class="p-5 flex-grow">
                    <div class="bg-indigo-50 text-indigo-600 p-3 rounded-xl w-fit mb-4"><i class="fa fa-font text-2xl"></i></div>
                    <h3 class="font-bold text-gray-900 mb-1.5">Reading Resources Generator</h3>
                    <p class="text-xs text-gray-600">Generate DepEd-aligned reading materials (CVC, Blends, Sentences) for Grades K-6.</p>
                </div>
                <div class="px-5 py-3.5 bg-gray-50 border-t border-gray-100">
                    <a href="reading-resources.html" onclick="return handleToolAccess(event, this.href)" class="text-xs font-bold text-indigo-600 hover:underline">Open Tool <i class="fa fa-arrow-right"></i></a>
                </div>
            </div>

            <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
                <h3 class="font-bold text-gray-900">ILAW Lesson Plan Generator</h3>
                <a href="Official DepEd ILAW Lesson Plan Generator.html" onclick="return handleToolAccess(event, this.href)" class="text-xs font-bold text-depedBlue">Open Tool <i class="fa fa-arrow-right"></i></a>
            </div>
            
        </div>
    </main>

    <script>
        // Initialize and update counter on load
        let freeTries = parseInt(localStorage.getItem('deped_toolkit_tries') || 3);
        document.getElementById('triesCounter').innerText = freeTries;
        
        function handleToolAccess(event, url) {
            if (freeTries > 0) return true;
            event.preventDefault();
            alert("Free tries exhausted. Please upgrade.");
            return false;
        }
    </script>
</body>
</html>
