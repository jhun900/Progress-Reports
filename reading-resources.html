<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reading Resources Generator</title>
    <style>
        /* A4 Aspect Ratio Styles */
        body { background: #f3f4f6; font-family: sans-serif; }
        .no-print { margin: 20px; }
        .page { width: 210mm; min-height: 297mm; padding: 20mm; margin: 10mm auto; border: 1px solid #ccc; background: white; white-space: pre-wrap; box-sizing: border-box; }
        @media print { .no-print { display: none; } .page { border: none; margin: 0; } }
    </style>
</head>
<body>
    <div class="no-print">
        <label>Grade Level:</label>
        <select id="grade">
            <option value="Kindergarten">Kindergarten</option>
            <option value="1">Grade 1</option>
            <option value="6">Grade 6</option>
        </select>

        <label>Area:</label>
        <select id="area">
            <option value="English">English</option>
            <option value="Filipino">Filipino</option>
        </select>

        <label>Type:</label>
        <select id="type">
            <option value="CVC">CVC Words</option>
            <option value="Word Families">Word Families (-at, -ag)</option>
            <option value="Short Story">Short Story (with comprehension)</option>
        </select>

        <button onclick="generate()">Generate Resource</button>
        <button onclick="window.print()">Print to A4 PDF</button>
    </div>

    <div id="content" class="page">Resource content will appear here...</div>

    <script>
        async function generate() {
            // 1. Check free tries
            let tries = parseInt(localStorage.getItem('deped_toolkit_tries') || 3);
            if (tries <= 0) {
                alert("Free tries exhausted. Please upgrade to continue.");
                return;
            }

            const contentDiv = document.getElementById('content');
            contentDiv.innerText = "Generating DepEd-aligned material...";

            const payload = {
                prompt: `Generate ${document.getElementById('type').value} for Grade ${document.getElementById('grade').value} in ${document.getElementById('area').value}. Strictly follow DepEd K-12 learning competencies.`
            };
            
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                contentDiv.innerText = data.content;

                // 2. Decrement tries only on success
                localStorage.setItem('deped_toolkit_tries', tries - 1);
            } catch (error) {
                contentDiv.innerText = "Error connecting to server. Please try again.";
            }
        }
    </script>
</body>
</html>
